<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Proxy Network - Lista de Agentes</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <header>
    <a href="index.html" style="text-decoration:none; color:inherit;">
        <h1>Inter-Knot Database</h1>
    </a>
    <div class="subtitle">Terminal de Registro de agentes</div>
</header>

<main style="display: flex; justify-content: center; align-items: center; min-height: 60vh;">
    <section class="card-zzz" style="border-top-color: var(--accent-neon); width: 100%; max-width: 400px; text-align: center;">
        <h2 style="margin-bottom: 20px;">Acceso a Red Proxy</h2>
        <div id="login-form" style="display: flex; flex-direction: column; gap: 15px; align-items: center;">
            <div style="width: 100%; text-align: left;">
                <label for="user" style="display: block; margin-bottom: 5px;">Usuario:</label>
                <input type="text" id="user" placeholder="Ingresa tu ID" style="width: 100%; box-sizing: border-box; padding: 10px;">
            </div>
            <div style="width: 100%; text-align: left;">
                <label for="pass" style="display: block; margin-bottom: 5px;">Contraseña:</label>
                <input type="password" id="pass" placeholder="Clave de acceso" style="width: 100%; box-sizing: border-box; padding: 10px;">
            </div>
            <button id="btn-login" style="width: 100%; padding: 10px; margin-top: 10px;">Verificar Credenciales de acceso</button>
            <span id="login-msg" aria-live="polite" style="font-weight:bold; margin-top: 5px; display: block; min-height: 20px;"></span>
        </div>
    </section>
</main>

<footer style="text-align: center; margin-top: 40px; color: var(--text-muted); font-size: 0.8rem;">
    <p>&copy; 2026 InterKnot - Proyecto Final FTW.</p>
</footer>

<script src="app.js"></script>
</body>
</html>
